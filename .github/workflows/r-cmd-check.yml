# GitHub Actions: SNPic CI
# Uses the validated Conda environment from environment.yml
name: SNPic CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  snpic-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Micromamba (fast Conda)
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: snpic_env
          cache-environment: true
          cache-downloads: true

      - name: Check R script syntax
        shell: micromamba-shell {0}
        run: |
          Rscript -e '
            files <- list.files("code/core", pattern = "[.]R$", full.names = TRUE)
            files <- c(files, list.files("code/utils", pattern = "[.]R$", full.names = TRUE))
            cat("Checking", length(files), "R scripts...\n")
            for (f in files) {
              cat("  ✓", basename(f), "\n")
              tryCatch(parse(file = f),
                       error = function(e) stop("Syntax error in ", f, ": ", e$message))
            }
            cat("✅ All R scripts parse successfully.\n")
          '

      - name: Test run_snpic.R --help
        shell: micromamba-shell {0}
        run: |
          Rscript code/core/run_snpic.R --help || true

      - name: Quick test (fast mode, gene mode)
        shell: micromamba-shell {0}
        run: |
          Rscript code/core/run_snpic.R \
            --input_folder "data/sig_snp_list" \
            --master_map "data/master_map/master_disease_mapping.csv" \
            --snp_gene_map "code/core/snp_gene_map_merged_finngen_ukbb.txt" \
            --out_prefix "/tmp/snpic_test" \
            --mode "gene" \
            --model "lda" \
            --k_only 5 \
            --keep_all_traits
